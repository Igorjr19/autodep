<div class="graph-card">
  <div class="graph-toolbar">
    <div class="legend">
      <button
        *ngFor="let cat of categories"
        type="button"
        class="legend-chip"
        [class.is-inactive]="!isCategoryActive(cat.key)"
        [style.--chip-color]="cat.color"
        [title]="cat.tooltip + ' · clique para ocultar/exibir'"
        (click)="toggleCategory(cat.key)"
      >
        <span class="legend-swatch"></span>
        {{ cat.label }}
      </button>
    </div>
    <p-button
      [label]="fisheyeEnabled() ? 'Lente: ativa' : 'Lente: desativada'"
      icon="pi pi-search-plus"
      [severity]="fisheyeEnabled() ? 'primary' : 'secondary'"
      size="small"
      (onClick)="toggleFisheye()"
    />
  </div>
  <div #host class="graph-host">
    <canvas #cv class="graph-canvas"></canvas>
    <div
      *ngIf="hoverTooltip().visible && hoverTooltip().node as n"
      class="graph-tooltip"
      [style.left.px]="hoverTooltip().x"
      [style.top.px]="hoverTooltip().y"
    >
      <div class="tooltip-name">{{ n.simpleName }}</div>
      <div class="tooltip-package">{{ n.packageName || '(root)' }}</div>
      <div class="tooltip-meta">
        <span class="tooltip-tag">{{ typeLabel(n.type) }}</span>
        <span class="tooltip-metric" [title]="defs.cbo.name">
          <span class="tooltip-metric-label">Acoplamento</span>
          <span class="tooltip-metric-value">{{ n.metrics.cbo }}</span>
        </span>
        <span class="tooltip-metric" [title]="defs.lcom.name">
          <span class="tooltip-metric-label">Coesão (LCOM)</span>
          <span class="tooltip-metric-value">{{ n.metrics.lcom | number: '1.2-2' }}</span>
        </span>
        <span class="tooltip-metric" [title]="defs.loc.name">
          <span class="tooltip-metric-label">Linhas</span>
          <span class="tooltip-metric-value">{{ n.metrics.linesOfCode }}</span>
        </span>
      </div>
    </div>
  </div>
</div>
