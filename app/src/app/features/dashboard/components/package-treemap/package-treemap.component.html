<div class="treemap-container">
  <div class="treemap-header">
    <h3
      class="m-0 text-lg font-medium"
      title="Cada retângulo é um pacote. Tamanho proporcional ao total de linhas de código; cor indica o acoplamento (CBO) médio do pacote."
    >
      <i class="pi pi-th-large mr-2"></i>Pacotes por tamanho
    </h3>
    <span class="text-sm text-500">
      tamanho = LOC total · cor = acoplamento médio · clique para filtrar o grafo
    </span>
  </div>
  <div #host class="treemap-host"></div>
  <div
    *ngIf="tooltip().visible && tooltip().pkg as p"
    class="treemap-tooltip"
    [style.left.px]="tooltip().x"
    [style.top.px]="tooltip().y"
  >
    <div class="font-semibold">{{ p.name }}</div>
    <div class="text-sm mt-1">Classes: {{ p.classCount }}</div>
    <div class="text-sm">Linhas de código (total): {{ p.totalLoc }}</div>
    <div class="text-sm">Acoplamento (CBO) médio: {{ p.meanCbo }}</div>
    <div class="text-sm">Coesão (LCOM) média: {{ p.meanLcom }}</div>
  </div>
</div>
