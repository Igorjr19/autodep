name: Build Windows (.exe)

# Gera o instalador NSIS do AutoDep para Windows, com JRE e engine embutidos.
# Dispare manualmente (Actions > Build Windows > Run workflow) ou via tag vX.Y.Z.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 22 (Temurin) — fornece jlink/jdeps
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependências do frontend
        run: pnpm install --frozen-lockfile

      - name: Preparar bundle (engine.jar + JRE jlink)
        run: powershell -ExecutionPolicy Bypass -File scripts/prepare-bundle.ps1

      - name: Build Tauri (NSIS)
        run: pnpm tauri build

      - name: Publicar instalador como artefato
        uses: actions/upload-artifact@v4
        with:
          name: autodep-windows-installer
          path: app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
